model_name: itransformer
seq_len: 64
pred_len: 5
batch_size: 256
eval_batch_size: 512
epochs: 6
learning_rate: 0.0004
weight_decay: 0.0001
patience: 2
huber_delta: 0.05
direction_loss_weight: 0.005
rank_loss_weight: 0.002
rank_loss_min_target_diff: 0.005
direction_calibration_min_improvement: 0.001
d_model: 96
n_heads: 4
num_layers: 2
dropout: 0.1
target: target_ret_5d
model_version: itransformer_wavelet_rank_v1
predictions_dir: outputs/experiments/final_rank_selection/predictions/itransformer_wavelet_rank
feature_columns:
  - ret_1d
  - ret_5d
  - log_volume
  - hl_spread
  - oc_change
  - rolling_vol_5
  - rolling_vol_20
  - ma_ratio_5_20
  - open_rel
  - high_rel
  - low_rel
  - ma5_rel
  - ma20_rel
wavelet_denoise:
  enabled: true
  append: true
  suffix: _denoised
  wavelet: db4
  level: 1
  mode: symmetric
  threshold_mode: soft
  feature_columns:
    - ret_1d
    - ret_5d
    - hl_spread
    - oc_change
    - ma_ratio_5_20
    - open_rel
    - high_rel
    - low_rel
    - ma5_rel
    - ma20_rel
seed: 42
device: auto
horizon: 5
