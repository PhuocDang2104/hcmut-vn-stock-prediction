raw_download:
  universe_scope: broad
  price_adjustment: adjusted_provider_history
  value_mode: null
  sleep_seconds: 0.3
  include_indices:
    - VNINDEX
    - VN30

universes:
  core: data/universes/core10.txt
  broad: data/universes/vn_stock_universe_95_plus_foreign_tech.txt

target:
  name: target_ret_5d
  horizon: 5

split:
  train_end: 2023-12-31
  valid_end: 2024-12-31
  test_end: 2026-12-31

features:
  - ret_1d
  - ret_3d
  - ret_5d
  - ret_10d
  - ret_20d
  - log_close
  - log_volume
  - volume_zscore_20
  - hl_spread
  - oc_change
  - gap_rel
  - body_ratio
  - upper_shadow_ratio
  - lower_shadow_ratio
  - rolling_vol_5
  - rolling_vol_20
  - vol_ratio_5_20
  - ma_ratio_5_20
  - open_rel
  - high_rel
  - low_rel
  - ma5_rel
  - ma20_rel
  - rsi_14
  - macd_hist
  - market_ret_1d
  - market_ret_5d
  - market_ret_20d
  - market_vol_20
  - excess_ret_1d
  - excess_ret_5d
  - excess_ret_20d
  - relative_strength_5d
  - relative_strength_20d

kronos_features:
  - open_rel
  - high_rel
  - low_rel
  - close_ret
  - log_volume

model_exports:
  xlstm_ts:
    context_length: 64
  itransformer:
    seq_len: 64
    pred_len: 5
  patchtst:
    seq_len: 64
    pred_len: 5
    patch_len: 16
    patch_stride: 8
  kronos:
    context_length: 64
    prediction_length: 5
    feature_columns:
      - open_rel
      - high_rel
      - low_rel
      - close_ret
      - log_volume
